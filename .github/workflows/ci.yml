name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/WindowsExplorerContextTools.sln

      - name: Build
        run: dotnet build src/WindowsExplorerContextTools.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/WindowsExplorerContextTools.sln --configuration Release --no-build
